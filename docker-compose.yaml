services:
  mongo:
    image: mongo:7
    container_name: devices-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: devices-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: devices
      MONGO_COLLECTION: devices
      ADDR: ":8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"

volumes:
  mongo-data:
